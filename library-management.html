<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Library Management System</title>

<style>

body{
    font-family: Arial, sans-serif;
    background:#eef2f6;
    margin:0;
    padding:0;
}

.container{
    width:70%;
    margin:auto;
    margin-top:40px;
}

h1{
    text-align:center;
    font-size:48px;
    margin-bottom:30px;
}

.search-box{
    background:white;
    padding:20px;
    border-radius:10px;
    border:1px solid #cfd8e3;
    margin-bottom:25px;
}

.search-box input{
    width:100%;
    padding:12px;
    margin-bottom:15px;
    border-radius:8px;
    border:1px solid #cfd8e3;
    font-size:16px;
}

.form-row{
    display:flex;
    gap:15px;
}

.form-row input{
    flex:1;
}

.add-btn{
    background:#2563eb;
    color:white;
    border:none;
    padding:12px 20px;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
}

.book{
    background:white;
    border:1px solid #cfd8e3;
    border-radius:10px;
    padding:20px;
    margin-bottom:20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.book h2{
    margin:0;
}

.author{
    color:#555;
    margin-top:5px;
}

.remove-btn{
    background:#ef4444;
    color:white;
    border:none;
    padding:10px 18px;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
}

</style>
</head>

<body>

<div class="container">

<h1>Library Management System</h1>

<div class="search-box">

<input type="text" placeholder="Search books...">

<div class="form-row">
<input type="text" placeholder="Book Title">
<input type="text" placeholder="Author">
<button class="add-btn">Add Book</button>
</div>

</div>

<div class="book">
<div>
<h2>The Great Gatsby</h2>
<div class="author">by S. Scott Fitzgerald</div>
</div>
<button class="remove-btn">Remove</button>
</div>

<div class="book">
<div>
<h2>To Kill a Mockingbird</h2>
<div class="author">by Harper Lee</div>
</div>
<button class="remove-btn">Remove</button>
</div>

<div class="book">
<div>
<h2>The Great Gatsby</h2>
<div class="author">by F. Scott Fitzgerald</div>
</div>
<button class="remove-btn">Remove</button>
</div>

</div>

</body>
</html>
